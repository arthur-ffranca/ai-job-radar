services:
  - type: web
    name: ai-job-radar-web
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: API_URL
        value: https://ai-job-radar-api.onrender.com
      - key: NEXT_PUBLIC_API_URL
        value: https://ai-job-radar-api.onrender.com
      - key: API_INTERNAL_HOST
        fromService:
          name: ai-job-radar-api
          type: web
          property: hostport

  - type: web
    name: ai-job-radar-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: ALLOWED_ORIGINS
        value: https://ai-job-radar-web.onrender.com
      - key: GROQ_API_KEY
        sync: false
