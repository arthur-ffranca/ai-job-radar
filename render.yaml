services:
  - type: web
    name: ai-job-radar-web
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: API_URL
        value: https://ai-job-radar-api.onrender.com
      - key: NEXT_PUBLIC_API_URL
        value: https://ai-job-radar-api.onrender.com
      - key: API_INTERNAL_HOST
        fromService:
          name: ai-job-radar-api
          type: web
          property: hostport
      - key: DATABASE_URL
        sync: false
      - key: NEXT_PUBLIC_POSTHOG_KEY
        sync: false
      - key: NEXT_PUBLIC_POSTHOG_HOST
        value: https://us.i.posthog.com
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: INTERNAL_METRICS_TOKEN
        sync: false

  - type: web
    name: ai-job-radar-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: ALLOWED_ORIGINS
        value: https://ai-job-radar-web.onrender.com,https://aijobradar.com.br,https://www.aijobradar.com.br
      - key: GROQ_API_KEY
        sync: false
